# ──────────────────────────────────────────────────────────────
# Noise & TerrainGen — Local Load-Balanced Architecture
#
# Spins up 3 replicas of the FastAPI terrain service behind
# an Nginx reverse-proxy / load balancer on port 8080.
#
# Usage:
#   docker compose up --build
#
# The frontend (served separately on :8000) continues to hit
# http://localhost:8080 — Nginx distributes requests across
# the 3 backend workers automatically.
# ──────────────────────────────────────────────────────────────

services:

  # ── Nginx Load Balancer ────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-1
      - backend-2
      - backend-3
    restart: unless-stopped

  # ── Backend Replicas ───────────────────────────────────────
  backend-1:
    build: ./server
    expose:
      - "8080"
    restart: unless-stopped

  backend-2:
    build: ./server
    expose:
      - "8080"
    restart: unless-stopped

  backend-3:
    build: ./server
    expose:
      - "8080"
    restart: unless-stopped
